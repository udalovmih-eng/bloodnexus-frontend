<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloodNexus - Інвентар</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="history.back()">←</button>
        <div class="logo">📦 Інвентар</div>
        <span class="skin-count" id="totalSkins">0 скінів</span>
    </div>

    <div class="equipped-skin" id="equippedSkin">
        <div class="equipped-label">✅ Одягнутий скін:</div>
        <div class="equipped-name">Немає</div>
    </div>

    <div class="skin-grid" id="inventoryList">
        <!-- Завантажується з API -->
    </div>

    <!-- Нижня навігація -->
    <div class="bottom-nav">
        <div class="nav-item" onclick="navigate('home')">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Головна</span>
        </div>
        <div class="nav-item" onclick="navigate('shop')">
            <span class="nav-icon">🛒</span>
            <span class="nav-label">Магазин</span>
        </div>
        <div class="nav-item active" onclick="navigate('inventory')">
            <span class="nav-icon">📦</span>
            <span class="nav-label">Інвентар</span>
        </div>
        <div class="nav-item" onclick="navigate('profile')">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Профіль</span>
        </div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="script.js"></script>
</body>
</html>
