<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloodNexus - Головна</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Хедер -->
    <div class="header">
        <div class="logo">🔥 Blood<span>Nexus</span></div>
        <div class="header-right">
            <span class="balance" id="userBalance">🪙 0</span>
            <button class="settings-btn">⚙️</button>
        </div>
    </div>

    <!-- Профіль-картка -->
    <div class="card profile-card">
        <div class="avatar" id="userAvatar">👤</div>
        <div class="profile-info">
            <div class="username" id="userName">Завантаження...</div>
            <div class="user-tag" id="userTag">@username</div>
        </div>
        <div class="profile-stats">
            <div class="stat">
                <span class="stat-value" id="userLevel">⭐ 1</span>
                <span class="stat-label">Рівень</span>
            </div>
        </div>
    </div>

    <!-- Швидка статистика -->
    <div class="stats-grid">
        <div class="stat-item">
            <div class="stat-number" id="skinCount">0</div>
            <div class="stat-label">Скінів</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="warnCount">0</div>
            <div class="stat-label">Варнів</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="daysCount">0</div>
            <div class="stat-label">Днів</div>
        </div>
    </div>

    <!-- Щоденний бонус -->
    <div class="card bonus-card">
        <div class="bonus-content">
            <div>
                <div class="bonus-title">📅 Щоденний бонус</div>
                <div class="bonus-amount">+50 🪙</div>
            </div>
            <button class="btn btn-gold" onclick="claimDaily()">Забрати</button>
        </div>
    </div>

    <!-- Навігаційні кнопки -->
    <div class="quick-actions">
        <div class="action-btn" onclick="navigate('shop')">
            <span class="action-icon">🛒</span>
            <span class="action-label">Магазин</span>
        </div>
        <div class="action-btn" onclick="navigate('inventory')">
            <span class="action-icon">📦</span>
            <span class="action-label">Інвентар</span>
        </div>
        <div class="action-btn" onclick="navigate('profile')">
            <span class="action-icon">👤</span>
            <span class="action-label">Профіль</span>
        </div>
    </div>

    <!-- Популярні скіни -->
    <h3 class="section-title">🔥 Популярні скіни</h3>
    <div class="skin-grid" id="popularSkins">
        <!-- Завантажується з API -->
    </div>

    <!-- Нижня навігація -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="navigate('home')">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Головна</span>
        </div>
        <div class="nav-item" onclick="navigate('shop')">
            <span class="nav-icon">🛒</span>
            <span class="nav-label">Магазин</span>
        </div>
        <div class="nav-item" onclick="navigate('inventory')">
            <span class="nav-icon">📦</span>
            <span class="nav-label">Інвентар</span>
        </div>
        <div class="nav-item" onclick="navigate('profile')">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Профіль</span>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</body>
</html>
